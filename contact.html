  <!-- Contact Section Start-->
  <section class="contact-section-main">
    <div class="contact-section-center wrapper text-center text-container">
      <div class="section-title padding-top-desktop-fifty padding-bottom-desktop-fifty padding-bottom-mobile-fifty padding-top-mobile-fifty">
        <h3 class="title">Contact Me</h3>
        <div class="underline"></div>

        <div class="contact-section padding-bottom-mobile-fifty padding-top-mobile-fifty padding-bottom-desktop-fifty padding-top-desktop-fifty">
          <div class="text-component padding-top-mobile-fifty padding-bottom-mobile-fifty padding-bottom-desktop-fifty padding-top-desktop-fifty">
            <form class="contact-me-form" action="#" method="post" aria-label="Contact form">
              <label for="name" class="sr-only">Name</label>
              <input type="text" name="name" id="name" placeholder="Enter your name" class="primary-input" aria-label="Your name">

              <!-- fixed duplicate id -> changed id to email, added label/aria -->
              <label for="email" class="sr-only">Email</label>
              <input type="email" name="email" id="email" placeholder="Enter your email" class="primary-input" aria-label="Your email">

              <label for="message" class="sr-only">Message</label>
              <textarea name="message" id="message" cols="30" rows="5" class="primary-text-area" placeholder="Enter your message" aria-label="Your message"></textarea>

              <button type="submit" class="primary-button-dark">Submit</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
